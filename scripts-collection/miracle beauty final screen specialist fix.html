<script>
    (() => {
        // --- CONFIGURATION BLOCK ---
        const CONFIG = {
            titleTranslations: {
                ru: "Ваша запись находится на рассмотрении, пожалуйста, ожидайте обратной связи от администратора.",
                en: "Your booking is under review, please wait for feedback from the administrator.",
                ka: "თქვენი ჯავშანი განხილვის პროცესშია, გთხოვთ დაელოდოთ უკუკავშირს ადმინისტრატორისგან.",
                az: "Sifarişiniz nəzərdən keçirilir, xahiş edirik administratorun rəyini gözləyin."
            },
            titleSelector: '[data-locator="created_booking_page_title"]',
            fallbackLang: "en",
            whatsappNoticeSelector: '[data-locator="whatsapp_notice_field_placeholder"]', // e.g. '[data-locator="dostupniy-nomer-whatsapp"]'
            whatsappNoticeText: {
                ru: "Пожалуйста, укажите активный номер WhatsApp. Подтверждение записи и вся дальнейшая связь будут осуществляться через WhatsApp. В противном случае запись не будет подтверждена.",
                en: "Please provide an active WhatsApp number. Your booking confirmation and all further communication will be made via WhatsApp. Otherwise, your booking will not be confirmed.",
                az: "Zəhmət olmasa, aktiv WhatsApp nömrəsi qeyd edin. Qeydiyyatın təsdiqi və sonrakı bütün əlaqə WhatsApp vasitəsilə aparılacaq. Əks halda, qeydiyyat təsdiqlənməyəcək."
            },
            anyStaffInitials: "A",
            anySpecialistTranslations: {
                az: 'İstənilən mütəxəssis',
                ru: 'Любой специалист',
                en: 'Any specialist'
            },
            anySpecialistLabelSet: [
                'Any specialist',
                'Любой специалист',
                'İstənilən mütəxəssis'
            ]
        };

        const applyCustomTranslations = () => {
            const currentLang = (document.documentElement.lang || navigator.language).toLowerCase();
            const titleElement = document.querySelector(CONFIG.titleSelector);
            if (titleElement) {
                const langKey = Object.keys(CONFIG.titleTranslations).find(key => currentLang.includes(key)) || CONFIG.fallbackLang;
                if (titleElement.textContent !== CONFIG.titleTranslations[langKey]) {
                    titleElement.textContent = CONFIG.titleTranslations[langKey];
                }
            }
        };

        const injectStaticText = () => {
            const currentLang = (document.documentElement.lang || navigator.language).toLowerCase();
            let textToInject = CONFIG.whatsappNoticeText[CONFIG.fallbackLang] || CONFIG.whatsappNoticeText.en;
            const langKey = Object.keys(CONFIG.whatsappNoticeText).find(key => currentLang.includes(key));
            if (langKey) {
                textToInject = CONFIG.whatsappNoticeText[langKey];
            }
            const targetElement = document.querySelector(CONFIG.whatsappNoticeSelector);
            if (targetElement) {
                const existingInjection = document.getElementById('custom-whatsapp-notice');
                if (!existingInjection) {
                    const newTextElement = document.createElement('div');
                    newTextElement.id = 'custom-whatsapp-notice';
                    newTextElement.style.cssText = `
                      font-size: 12px; 
                      color: var(--y-core-color-text-secondary); 
                      margin-top: 8px; 
                      line-height: 16px;
                    `;
                    newTextElement.textContent = textToInject;
                    targetElement.insertAdjacentElement('afterend', newTextElement);
                } else if (existingInjection.textContent !== textToInject) {
                    existingInjection.textContent = textToInject;
                }
            }
        };

        applyCustomTranslations();
        injectStaticText();

        const observer = new MutationObserver(() => {
            applyCustomTranslations();
            injectStaticText();
        });
        observer.observe(document.body, { childList: true, subtree: true });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });

        // Update staffer icons with generic initials
        setInterval(() => {
            const icons = document.querySelectorAll('.any-staff-icon.sized');
            icons.forEach(element => {
                if (element.innerText !== CONFIG.anyStaffInitials) {
                    element.innerHTML = CONFIG.anyStaffInitials;
                    element.style.display = "flex";
                    element.style.alignItems = "center";
                    element.style.justifyContent = "center";
                    element.style.fontWeight = "bold";
                }
            });
        }, 500);

        // Update master name texts for "any specialist" translations
        setInterval(() => {
            const currentLang = (document.documentElement.lang || navigator.language).toLowerCase();
            const targetText = currentLang.includes('az')
                ? CONFIG.anySpecialistTranslations.az
                : currentLang.includes('ru') ? CONFIG.anySpecialistTranslations.ru : CONFIG.anySpecialistTranslations.en;
            const masterTextElement = document.querySelector('[data-locator="master_name"]');
            if (!masterTextElement) {
                return;
            }

            const currentText = masterTextElement.textContent.trim();
            const labelSet = new Set(CONFIG.anySpecialistLabelSet);
            if (labelSet.has(currentText) && currentText !== targetText) {
                masterTextElement.textContent = targetText;
            }
        }, 300);
    })();
</script>
