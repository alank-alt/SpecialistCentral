<script>
(function() {
    const CONFIG = {
        stateAttributes: {
            processedLang: 'data-hardcoded-lang'
        },
        checkIntervalMs: 500,
        // REPLACE WITH YOUR ACTUAL SELECTORS, QUESTION SELECTORS, AND TRANSLATIONS
        translations: {
            '[data-locator="QUESTION_SELECTOR_1_PLACEHOLDER"] .select-title': {
                "lv-LV": "Vai jūsu mājdzīvniekam ir veiktas visas nepieciešamās potes?",
                "en-US": "Has your pet received all the necessary vaccinations?",
                "ru-RU": "Все ли необходимые прививки сделаны у вашего питомца?",
                "default": "Has your pet received all the necessary vaccinations?"
            },
            '.options-container .option:nth-child(2) .option-label': {
                "lv-LV": "Jā",
                "en-US": "Yes",
                "ru-RU": "Да",
                "default": "Yes"
            },
            '.options-container .option:nth-child(3) .option-label': {
                "lv-LV": "Nē",
                "en-US": "No",
                "ru-RU": "Нет",
                "default": "No"
            }
        }
    };
    function applyHardcodedTranslations() {
        const currentLang = document.documentElement.lang || "default";
        for (const selector in CONFIG.translations) {
            if (CONFIG.translations.hasOwnProperty(selector)) {
                const langOptions = CONFIG.translations[selector];
                const targetText = langOptions[currentLang] !== undefined 
                    ? langOptions[currentLang] 
                    : langOptions["default"];
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    if (el.getAttribute(CONFIG.stateAttributes.processedLang) !== currentLang) {
                        el.textContent = targetText;
                        el.setAttribute(CONFIG.stateAttributes.processedLang, currentLang);
                    }
                });
            }
        }
    }
    setInterval(applyHardcodedTranslations, CONFIG.checkIntervalMs);
})();</script>
